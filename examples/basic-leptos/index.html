<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>taino-edit demo</title>
    <link data-trunk rel="rust" data-bin="basic-leptos" />
    <style>
      .taino-editor {
        border: 1px solid #ccc;
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        min-height: 8rem;
        line-height: 1.5;
      }
      .taino-editor:focus {
        outline: 2px solid #4f46e5;
        outline-offset: 1px;
      }
      .taino-editor table {
        border-collapse: collapse;
        margin: 0.5rem 0;
      }
      .taino-editor td,
      .taino-editor th {
        border: 1px solid #b0b6be;
        padding: 0.25rem 0.5rem;
        min-width: 2rem;
        vertical-align: top;
      }
      .taino-editor th {
        background: #f0f2f4;
        font-weight: 600;
      }
    </style>
  </head>
  <body></body>
</html>
