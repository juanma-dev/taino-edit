<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>taino-edit + Dioxus demo</title>
    <link data-trunk rel="rust" data-bin="basic-dioxus" />
    <style>
        .taino-editor {
            border: 1px solid #d0d7de;
            border-radius: 4px;
            padding: 0.75rem 1rem;
            min-height: 6rem;
            font: 16px/1.5 system-ui, sans-serif;
            outline: none;
        }
        .taino-editor:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }
        .taino-editor table {
            border-collapse: collapse;
            margin: 0.5rem 0;
        }
        .taino-editor td,
        .taino-editor th {
            border: 1px solid #b0b6be;
            padding: 0.25rem 0.5rem;
            min-width: 2rem;
            vertical-align: top;
        }
        .taino-editor th {
            background: #f0f2f4;
            font-weight: 600;
        }
        .taino-editor .taino-cell-selected {
            background: #cfe3ff;
        }
    </style>
</head>
<body>
    <div id="main"></div>
</body>
</html>
